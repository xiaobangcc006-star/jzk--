<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="data:," />
    <title>页面不存在 - 急诊抢救记录单</title>
    <style>
      html { background: #ffffff; }
      body { margin: 0; color: #111111; font: 16px/1.5 "Songti SC", SimSun, serif; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; text-align: center; }
      a { color: #075c61; }
    </style>
  </head>
  <body>
    <main>
      <p>页面不存在，正在返回急诊抢救记录单……<br /><a id="home-link" href="./emergency-rescue.html">立即打开急诊抢救记录单</a></p>
    </main>
    <script>
      (function () {
        const pathParts = window.location.pathname.split("/").filter(Boolean);
        const isProjectPages = window.location.hostname.endsWith(".github.io") && pathParts.length > 0;
        const basePath = isProjectPages ? `/${pathParts[0]}/` : "/";
        const destination = `${window.location.origin}${basePath}emergency-rescue.html`;
        document.getElementById("home-link").href = destination;
        window.setTimeout(() => window.location.replace(destination), 1200);
      })();
    </script>
  </body>
</html>
