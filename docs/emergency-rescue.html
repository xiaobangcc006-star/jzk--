<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="data:,">
  <title>急诊抢救记录单</title>
  <script src="./export-config.js"></script>
  <style>
    :root {
      --bg: #eaf0fb;
      --surface: #f6f8ff;
      --surface-soft: #eef4ff;
      --ink: #1b2535;
      --muted: #626d7d;
      --line: #d9e1ed;
      --strong-line: #c5cfdd;
      --accent: #22aee6;
      --accent-strong: #0b6d93;
      --accent-soft: #e8f8ff;
      --blue: #277da8;
      --green: #2a88a8;
      --amber: #b76f11;
      --red: #d52257;
      --shadow: 7px 9px 20px rgba(61, 77, 101, 0.14), -6px -6px 18px rgba(255, 255, 255, 0.92);
      --shadow-soft: 4px 5px 12px rgba(61, 77, 101, 0.11), -4px -4px 12px rgba(255, 255, 255, 0.9);
      --shadow-press: inset 4px 4px 9px rgba(72, 87, 111, 0.16), inset -4px -4px 9px rgba(255, 255, 255, 0.94);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      width: 100%;
      margin: 0;
      min-height: 100dvh;
      background:
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 38%, #e7eef9 100%);
      color: var(--ink);
      overflow-x: hidden;
      touch-action: pan-y;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 460px;
      min-height: 100dvh;
      margin: 0 auto;
      padding-bottom: calc(104px + env(safe-area-inset-bottom));
    }

    body.actions-collapsed .app {
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: calc(7px + env(safe-area-inset-top)) 10px 8px;
      border-bottom: 1px solid rgba(210, 220, 235, 0.82);
      background: rgba(238, 244, 253, 0.96);
      box-shadow: 0 6px 18px rgba(55, 72, 98, 0.1), inset 0 -1px 0 rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }

    .top-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 74px;
    }

    .home-link {
      position: absolute;
      left: 0;
      top: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 9px;
      border: 1px solid #d7e2ef;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
      box-shadow: var(--shadow-soft);
      transform: translateY(-50%);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
      text-align: center;
    }

    .title-block {
      min-width: 0;
      width: 100%;
      text-align: center;
    }

    .status-pill {
      position: absolute;
      right: 0;
      top: 50%;
      width: 66px;
      min-width: 0;
      padding: 5px 7px;
      border-radius: 10px;
      border: 1px solid #d7e2ef;
      background: linear-gradient(145deg, #ffffff, #edf4ff);
      color: var(--accent-strong);
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      transform: translateY(-50%);
    }

    .nav-caption {
      display: none;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .anchor-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 7px;
    }

    .anchor-chip {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-width: 0;
      min-height: 34px;
      padding: 5px 15px 5px 30px;
      border: 1px solid #d4deec;
      border-radius: 11px;
      background: linear-gradient(145deg, #ffffff, #edf3ff);
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      text-align: left;
      white-space: normal;
      box-shadow: var(--shadow-soft);
    }

    .anchor-chip::before {
      position: absolute;
      left: 10px;
      top: 50%;
      display: grid;
      place-items: center;
      width: 17px;
      height: 17px;
      border-radius: 7px;
      background: #e8f8ff;
      color: var(--accent-strong);
      font-size: 9px;
      font-weight: 900;
      transform: translateY(-50%);
    }

    .anchor-chip:nth-child(1)::before { content: "01"; }
    .anchor-chip:nth-child(2)::before { content: "02"; }
    .anchor-chip:nth-child(3)::before { content: "03"; }
    .anchor-chip:nth-child(4)::before { content: "04"; }
    .anchor-chip:nth-child(5)::before { content: "05"; }
    .anchor-chip:nth-child(6)::before { content: "06"; }

    .anchor-chip::after {
      content: "›";
      position: absolute;
      right: 6px;
      top: 50%;
      color: #8793a4;
      font-size: 15px;
      line-height: 1;
      transform: translateY(-52%);
    }

    .anchor-chip.active {
      border-color: var(--accent-strong);
      background: linear-gradient(145deg, #33bff0, #118bc2);
      color: #fff;
      box-shadow: inset 2px 2px 5px rgba(8, 83, 119, 0.26), inset -2px -2px 6px rgba(106, 215, 249, 0.52);
    }

    .anchor-chip.active::before {
      background: #fff;
      color: var(--accent-strong);
    }

    .anchor-chip.active::after {
      color: #fff;
    }

    main {
      padding: 7px 10px 10px;
    }

    .view-page {
      display: none;
    }

    .view-page.active {
      display: block;
      animation: pageIn 0.18s ease-out;
    }

    @keyframes pageIn {
      from {
        opacity: 0.72;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .panel {
      position: relative;
      margin-bottom: 8px;
      border: 1px solid rgba(215, 225, 239, 0.96);
      border-radius: var(--radius);
      background: linear-gradient(145deg, #ffffff, #f1f5ff);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .view-page.active > .panel:first-child {
      border-left: 4px solid var(--accent);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 36px;
      padding: 7px 10px;
      border-bottom: 1px solid rgba(214, 224, 238, 0.9);
      background: rgba(255, 255, 255, 0.62);
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.92);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.3;
    }

    .panel-note {
      flex: 0 0 auto;
      padding: 3px 6px;
      border-radius: 9px;
      background: #eef4ff;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      box-shadow: var(--shadow-press);
    }

    .panel-body {
      padding: 9px 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .form-grid.two,
    .form-grid.three {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: 8px;
      row-gap: 7px;
      align-items: end;
    }

    .field {
      min-width: 0;
      width: 100%;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .label {
      display: block;
      margin-bottom: 3px;
      color: #555f70;
      font-size: 11px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      max-width: 100%;
      min-height: 34px;
      border: 1px solid #d5dfec;
      border-radius: 10px;
      background: #f7faff;
      color: var(--ink);
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      outline: none;
      box-shadow: var(--shadow-press);
    }

    input,
    select {
      display: block;
      height: 32px;
      padding: 5px 8px;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      padding-right: 24px;
      background-image:
        linear-gradient(45deg, transparent 50%, #6c7786 50%),
        linear-gradient(135deg, #6c7786 50%, transparent 50%);
      background-position:
        calc(100% - 14px) 50%,
        calc(100% - 9px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    input[type="time"],
    input[type="datetime-local"] {
      appearance: none;
      -webkit-appearance: none;
      padding-right: 7px;
    }

    input::-webkit-date-and-time-value {
      min-height: 20px;
      line-height: 20px;
      text-align: left;
    }

    input::-webkit-calendar-picker-indicator {
      width: 15px;
      height: 15px;
      margin: 0;
      padding: 0;
      opacity: 0.75;
    }

    textarea {
      min-height: 64px;
      resize: vertical;
      padding: 7px 9px;
      line-height: 1.45;
    }

    .brief-textarea {
      min-height: 300px;
    }

    .treatment-textarea {
      min-height: 220px;
    }

    .bp-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .pupil-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 2px;
      padding: 9px;
      border: 1px dashed #cfdcec;
      border-radius: var(--radius);
      background: linear-gradient(145deg, #f8fbff, #edf3ff);
      box-shadow: var(--shadow-press);
    }

    .pupil-block {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .pupil-title {
      position: relative;
      padding-left: 9px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      line-height: 1.2;
      white-space: nowrap;
    }

    .pupil-title::before {
      content: "";
      position: absolute;
      left: 0;
      top: 1px;
      bottom: 1px;
      width: 3px;
      border-radius: 999px;
      background: #24b7ee;
    }

    .pupil-control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      align-items: end;
    }

    .pupil-control-grid .label {
      color: var(--muted);
      font-size: 10px;
    }

    .vitals-tail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-items: end;
    }

    .vitals-tail-grid .label {
      font-size: 10px;
      white-space: nowrap;
    }

    .mini-label {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: inset 3px 3px 7px rgba(72, 87, 111, 0.14), inset -3px -3px 7px rgba(255, 255, 255, 0.96), 0 0 0 2px rgba(34, 174, 230, 0.16);
    }

    .helper {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .quick-row {
      display: flex;
      gap: 5px;
      margin-top: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .quick-row.wrap {
      flex-wrap: wrap;
      overflow: visible;
    }

    .quick-row::-webkit-scrollbar {
      display: none;
    }

    .chip,
    .small-btn {
      flex: 0 0 auto;
      min-height: 27px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(145deg, #ffffff, #edf3ff);
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: var(--shadow-soft);
    }

    .small-btn.primary {
      border-color: var(--accent);
      background: linear-gradient(145deg, #34c2f2, #118ac0);
      color: #fff;
      box-shadow: 3px 5px 12px rgba(17, 138, 192, 0.26), -3px -3px 10px rgba(255, 255, 255, 0.9);
    }

    .small-btn.blue {
      border-color: #d7e4f2;
      background: linear-gradient(145deg, #ffffff, #edf3f7);
      color: var(--blue);
    }

    .small-btn.red {
      border-color: #ecd8d6;
      background: linear-gradient(145deg, #fffdfc, #f8eceb);
      color: var(--red);
    }

    .row-card {
      display: grid;
      gap: 6px;
      padding: 7px;
      border: 1px solid #d7e2ef;
      border-radius: var(--radius);
      background: linear-gradient(145deg, #ffffff, #f0f5ff);
      box-shadow: inset 1px 1px 2px rgba(63, 78, 100, 0.05), inset -1px -1px 2px rgba(255, 255, 255, 0.92);
    }

    .row-card.row-highlight {
      outline: 2px solid rgba(16, 169, 214, 0.55);
      animation: row-highlight-fade 2.4s ease forwards;
    }

    .status-box {
      min-height: 46px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #f8fbff;
    }

    .export-warning { color: #a43b4b; font-weight: 700; }

    @keyframes row-highlight-fade {
      0%, 55% { outline-color: rgba(16, 169, 214, 0.75); }
      100% { outline-color: transparent; }
    }

    .row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .row-title {
      font-size: 12px;
      font-weight: 850;
      color: var(--ink);
    }

    .template-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 8px;
      padding: 7px 0;
      border-top: 1px solid var(--line);
      color: var(--ink);
      font-size: 12px;
      line-height: 1.45;
      word-break: break-all;
    }

    .template-group-actions,
    .template-item-actions {
      display: flex;
      flex: 0 0 auto;
      gap: 5px;
      align-items: center;
    }

    .template-group-actions .small-btn,
    .template-item-actions .small-btn {
      min-height: 26px;
      padding: 4px 7px;
    }

    .compact-nav {
      display: grid;
      gap: 6px;
      padding: 7px;
      border: 1px solid #d4e1ef;
      border-radius: var(--radius);
      background: linear-gradient(145deg, #fbfdff, #e9f1fc);
      box-shadow: var(--shadow-press);
    }

    .compact-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 850;
    }

    .count-pill {
      flex: 0 0 auto;
      padding: 3px 6px;
      border-radius: 9px;
      background: #f8fbff;
      color: var(--accent-strong);
      border: 1px solid #d7e1ee;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .compact-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 5px;
    }

    .compact-actions .small-btn {
      width: 100%;
      min-width: 0;
      padding-inline: 4px;
      text-align: center;
    }

    .stack {
      display: grid;
      gap: 7px;
    }

    .safety-note {
      margin-top: 8px;
      padding: 7px 9px;
      border: 1px solid #cfe3f2;
      border-radius: var(--radius);
      background: linear-gradient(145deg, #fbfdff, #eaf6ff);
      color: #225c7a;
      font-size: 11px;
      line-height: 1.45;
    }

    .bottom-actions {
      position: fixed;
      right: auto;
      bottom: calc(8px + env(safe-area-inset-bottom));
      left: 50%;
      z-index: 40;
      width: min(calc(100% - 18px), 430px);
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(246, 249, 255, 0.98);
      box-shadow: 7px 9px 22px rgba(54, 71, 98, 0.18), -4px -4px 12px rgba(255, 255, 255, 0.9);
      transform: translateX(-50%);
      backdrop-filter: blur(8px);
    }

    .bottom-actions.collapsed {
      left: auto;
      right: 12px;
      bottom: calc(72px + env(safe-area-inset-bottom));
      width: auto;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      transform: none;
      backdrop-filter: none;
    }

    .action-toggle {
      position: absolute;
      right: 12px;
      top: -36px;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(145deg, #ffffff, #edf4ff);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 850;
      box-shadow: var(--shadow-soft);
    }

    .bottom-actions.collapsed .action-toggle {
      position: static;
      width: 52px;
      height: 52px;
      border-color: var(--accent);
      border-radius: 50%;
      background: linear-gradient(145deg, #34c2f2, #118bc2);
      color: #fff;
      box-shadow: 6px 8px 18px rgba(17, 139, 194, 0.28), -4px -4px 12px rgba(255, 255, 255, 0.8);
    }

    .bottom-actions.collapsed .action-grid {
      display: none;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    .action-btn {
      min-width: 0;
      min-height: 36px;
      padding: 7px 5px;
      border-radius: var(--radius);
      border: 1px solid #d5e1ef;
      background: linear-gradient(145deg, #ffffff, #edf4ff);
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      line-height: 1.15;
      box-shadow: var(--shadow-soft);
    }

    .action-btn.save {
      border-color: var(--accent);
      background: linear-gradient(145deg, #34c2f2, #118bc2);
      color: #fff;
      box-shadow: 3px 5px 12px rgba(17, 139, 194, 0.27), -3px -3px 10px rgba(255, 255, 255, 0.84);
    }

    .action-btn.pdf {
      background: linear-gradient(145deg, #fffdf7, #f4ecdc);
      color: var(--amber);
    }

    .action-btn.clear {
      background: linear-gradient(145deg, #fffdfc, #f8eceb);
      color: var(--red);
    }

    .action-btn.restore {
      background: linear-gradient(145deg, #ffffff, #edf3f7);
      color: var(--blue);
    }

    button:active,
    .anchor-chip:active,
    .chip:active,
    .small-btn:active,
    .action-btn:active,
    .image-download:active {
      transform: translateY(1px);
      box-shadow: var(--shadow-press);
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: calc(142px + env(safe-area-inset-bottom));
      left: 16px;
      z-index: 50;
      max-width: 480px;
      margin: 0 auto;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: #17243a;
      color: #fff;
      font-size: 14px;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .image-export-sheet {
      position: fixed;
      inset: 0;
      z-index: 60;
      padding: 12px;
      overflow: auto;
      background: rgba(23, 35, 54, 0.46);
    }

    .image-export-sheet[hidden] {
      display: none;
    }

    .image-export-panel {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(145deg, #ffffff, #eef4ff);
      box-shadow: 0 16px 38px rgba(37, 54, 82, 0.2), -4px -4px 14px rgba(255, 255, 255, 0.82);
    }

    .image-export-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .image-export-list {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .image-export-card {
      display: grid;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(145deg, #ffffff, #edf4ff);
      box-shadow: var(--shadow-soft);
    }

    .image-export-card img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid #222;
      background: #fff;
    }

    .export-summary {
      gap: 10px;
      padding: 10px;
    }

    .export-summary strong {
      font-size: 16px;
      color: var(--ink);
    }

    .export-summary p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .image-export-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .image-download {
      justify-self: start;
      min-height: 32px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: linear-gradient(145deg, #ffffff, #edf6ff);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: var(--shadow-soft);
    }

    #printArea {
      display: none;
    }

    .print-page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 10mm;
      color: #000;
      background: #fff;
      font-family: "SimSun", "宋体", "Songti SC", serif;
      font-size: 10.5pt;
      line-height: 1.25;
    }

    .print-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2mm;
      margin-bottom: 1mm;
    }

    .print-emblem {
      width: 12mm;
      height: 12mm;
      object-fit: contain;
    }

    .print-hospital {
      width: 116mm;
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .print-title {
      margin: 0 0 1.5mm;
      text-align: center;
      font-size: 18pt;
      font-weight: 700;
      letter-spacing: 7px;
    }

    .print-line {
      display: flex;
      justify-content: space-between;
      gap: 4mm;
      margin-bottom: 1mm;
      font-size: 10pt;
    }

    .print-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: 1.2px solid #000;
    }

    .print-table th,
    .print-table td {
      border: 1px solid #000;
      padding: 1.1mm 1.2mm;
      vertical-align: middle;
      word-break: break-all;
      white-space: pre-wrap;
    }

    .print-table th {
      text-align: center;
      font-weight: 700;
    }

    .print-table .center {
      text-align: center;
    }

    .print-table .label-cell {
      text-align: center;
      font-weight: 700;
      background: #fff;
    }

    .brief-cell {
      height: 18mm;
      vertical-align: top !important;
      font-size: 10pt;
    }

    .print-section-title {
      text-align: center;
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 5px;
      background: #fff;
    }

    .vitals-table th,
    .vitals-table td {
      height: 7.2mm;
      padding: 0.7mm;
      text-align: center;
      font-size: 8.3pt;
    }

    .consult-table th,
    .consult-table td {
      height: 8.2mm;
    }

    .vitals-table .row-label {
      width: 24mm;
      font-size: 8.5pt;
      font-weight: 700;
      background: #fff;
    }

    .pupil-cell {
      font-size: 8pt;
      line-height: 1.1;
    }

    .pupil-cell .diag-top,
    .pupil-cell .diag-bottom {
      font-size: 9.2pt;
      font-weight: 700;
    }

    .diagonal-cell {
      position: relative;
      min-width: 0;
      overflow: hidden;
    }

    .diagonal-cell::before {
      content: "";
      position: absolute;
      left: -13%;
      top: 50%;
      width: 126%;
      border-top: 1px solid #000;
      transform: rotate(-32deg);
      transform-origin: center;
    }

    .diag-top,
    .diag-bottom {
      position: absolute;
      z-index: 1;
      max-width: 86%;
      font-size: 7.8pt;
      line-height: 1;
      white-space: nowrap;
    }

    .diag-top {
      top: 32%;
      left: 31%;
      text-align: center;
      transform: translate(-50%, -50%);
    }

    .diag-bottom {
      top: 76%;
      left: 72%;
      text-align: center;
      transform: translate(-50%, -50%);
    }

    .print-footnote {
      margin-top: 1.5mm;
      font-size: 9pt;
      text-align: center;
    }

    .print-page-no {
      margin-top: 2mm;
      text-align: center;
      font-size: 10pt;
    }

    .record-table th,
    .record-table td {
      font-size: 9.2pt;
      line-height: 1.2;
    }

    .record-table td {
      height: 9mm;
      vertical-align: top;
    }

    .record-table .time-col {
      width: 18mm;
      text-align: center;
    }

    .record-table .drug-col {
      width: 43mm;
    }

    .record-table .sign-col {
      width: 24mm;
      text-align: center;
    }

    @media (min-width: 390px) {
      .form-grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 374px) {
      h1 {
        font-size: 16px;
      }

      main {
        padding-inline: 7px;
      }

      .panel-body {
        padding: 9px;
      }

      .anchor-chip,
      .chip,
      .small-btn,
      .action-btn {
        font-size: 12px;
      }

      .action-grid {
        gap: 6px;
      }

      .compact-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      html,
      body {
        width: auto;
        min-height: auto;
        background: #fff;
      }

      .app,
      .bottom-actions,
      .image-export-sheet,
      .toast {
        display: none !important;
      }

      #printArea {
        display: block !important;
      }

      .print-page {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        padding: 10mm;
        break-after: page;
        page-break-after: always;
      }

      .print-page:last-child {
        break-after: auto;
        page-break-after: auto;
      }

      .print-table tr,
      .record-table tr {
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="top-row">
        <a class="home-link" href="./index.html">首页</a>
        <div class="title-block">
          <h1>急诊抢救记录单</h1>
        </div>

      </div>

        <button class="anchor-chip" data-view="consult" type="button">会诊检查</button>
        <button class="anchor-chip" data-view="vitals" type="button">生命体征</button>
        <button class="anchor-chip" data-view="records" type="button">用药处理</button>

      <button class="action-btn clear" id="clearStepBtn">清空上一步</button>
      <button class="action-btn clear" id="clearAllBtn">清空全部</button>
      <button class="action-btn restore" id="restoreStepBtn">恢复上一步</button>
      <button class="action-btn restore" id="restoreAllBtn">恢复全部</button>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <input id="recordImportInput" type="file" accept="application/json,.json" hidden>
  <div id="printArea" aria-hidden="true"></div>

      <p class="helper" id="exportServiceHint">正在准备导出方式...</p>
      <div class="image-export-list" id="imageExportList"></div>
    </div>
  </div>

    function defaultTemplateLibrary(base = {}) {
      return {
        brief: Array.isArray(base.brief) ? base.brief : [],

        treatment: Array.isArray(base.treatment) ? base.treatment : []
      };
    }

    function defaultVital(base = {}) {
      const rawBp = valueOrDefault(base, "bp", "");
      const bpParts = splitBloodPressure(rawBp);
      const hasSystolic = Object.prototype.hasOwnProperty.call(base, "bpSystolic");
      const hasDiastolic = Object.prototype.hasOwnProperty.call(base, "bpDiastolic");
      const legacySystolic = ["测不出", "未测出"].includes(bpParts[0]) ? "" : bpParts[0];
      const bpSystolic = hasSystolic ? valueOrDefault(base, "bpSystolic", "") : legacySystolic;
      const bpDiastolic = hasDiastolic ? valueOrDefault(base, "bpDiastolic", "") : (bpParts[1] || "");
      const bpText = formatBloodPressure(bpSystolic, bpDiastolic);
      return {
        id: valueOrDefault(base, "id", createId("vital")),
        dayOffset: Number(valueOrDefault(base, "dayOffset", 0)) || 0,
        createdAt: valueOrDefault(base, "createdAt", new Date().toISOString()),
        updatedAt: valueOrDefault(base, "updatedAt", new Date().toISOString()),
        time: valueOrDefault(base, "time", ""),
        temp: valueOrDefault(base, "temp", ""),
        pulse: valueOrDefault(base, "pulse", ""),
        respiration: valueOrDefault(base, "respiration", ""),
        bpSystolic,
        bpDiastolic,
        bp: bpText || (["测不出", "未测出"].includes(rawBp) ? "" : rawBp),
        spo2: valueOrDefault(base, "spo2", ""),
        consciousness: valueOrDefault(base, "consciousness", ""),
        gcs: valueOrDefault(base, "gcs", ""),
        leftPupil: valueOrDefault(base, "leftPupil", ""),

        rightReflect: valueOrDefault(base, "rightReflect", ""),
        urine: valueOrDefault(base, "urine", ""),
        glucose: valueOrDefault(base, "glucose", "")
      };
    }

    function bindEvents() {
      viewNav.addEventListener("click", handleViewChange);
      formRoot.addEventListener("input", handleFieldChange);

      formRoot.addEventListener("change", handleTemplateSelection);
      formRoot.addEventListener("click", handleAction);

      document.getElementById("exportPdfBtn").addEventListener("click", exportImages);
      document.getElementById("clearStepBtn").addEventListener("click", clearStep);
      document.getElementById("clearAllBtn").addEventListener("click", clearAll);
      document.getElementById("restoreStepBtn").addEventListener("click", restoreStep);
      document.getElementById("restoreAllBtn").addEventListener("click", restoreAll);

      actionToggleBtn.addEventListener("click", toggleActionsCollapsed);
      window.addEventListener("beforeprint", () => renderPrintArea());
      window.addEventListener("beforeunload", event => {
        if (!meta.dirty) return;
        event.preventDefault();
        event.returnValue = "";
      });
      document.addEventListener("keydown", handleKeyboardShortcuts);
    }

    function render() {
      formRoot.innerHTML = `
        ${renderView("patient", renderPatientPanel())}
        ${renderView("brief", renderBriefPanel())}
        ${renderView("consult", renderConsultPanel())}
        ${renderView("vitals", renderVitalsPanel())}
        ${renderView("records", renderRecordsPanel())}
        ${renderView("templates", renderTemplatesPanel())}
        ${renderDatalists()}
      `;
      updateNavState();
    }

    function renderView(view, content) {
      const active = getActiveView() === view ? " active" : "";
      return `<div class="view-page${active}" data-view-page="${attr(view)}">${content}</div>`;
    }

    function getActiveView() {
      return VIEW_LABELS[meta.activeView] ? meta.activeView : "patient";
    }

    function setActiveView(view) {
      if (!VIEW_LABELS[view]) return;
      meta.activeView = view;
      localStorage.setItem(META_KEY, JSON.stringify(meta));
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function updateNavState() {
      const activeView = getActiveView();
      viewNav.querySelectorAll("[data-view]").forEach(button => {
        const active = button.dataset.view === activeView;
        button.classList.toggle("active", active);
        button.setAttribute("aria-current", active ? "page" : "false");
      });
    }

    function handleViewChange(event) {
      const button = event.target.closest("[data-view]");
      if (!button) return;
      setActiveView(button.dataset.view);
    }

    function renderMedicationPicker(index) {

        <div class="field full">
          <label class="label">抢救常用药快捷按钮</label>
          <div class="quick-row wrap">

              <button class="small-btn blue" data-action="select-medication" data-index="${index}" data-medication="${attr(item.value)}" type="button">${escapeHtml(item.label)}</button>

    function renderBloodPressureFields(index, row) {

        <div class="field full">
          <label class="label">血压(mmHg)</label>
          <div class="bp-grid">
            ${renderBloodPressureInput(index, "bpSystolic", "bp_systolic", "收缩压", systolic, "bpList")}
            ${renderBloodPressureInput(index, "bpDiastolic", "bp_diastolic", "舒张压", diastolic, "bpDiastolicList")}

    function renderBloodPressureInput(index, key, idSuffix, label, value, listId) {
      return `
        <div>
          <label class="mini-label" for="vitals_${index}_${idSuffix}">${label}</label>
          <input id="vitals_${index}_${idSuffix}" type="text" inputmode="numeric" data-path="vitals.${index}.${key}" value="${attr(value)}" placeholder="" list="${listId}">

    function field(label, path, type, value, extraClass = "", placeholder = "", list = "") {
      const id = path.replace(/[^a-zA-Z0-9]+/g, "_");
      return `
        <div class="field ${extraClass}">
          <label class="label" for="${id}">${label}</label>
          <input id="${id}" type="${type}" data-path="${path}" value="${attr(value || "")}" placeholder="${attr(placeholder)}"${list ? ` list="${list}"` : ""}>
        </div>
      `;
    }

    function selectField(label, path, value, options, extraClass = "") {
      const id = path.replace(/[^a-zA-Z0-9]+/g, "_");
      return `
        <div class="field ${extraClass}">
          <label class="label" for="${id}">${label}</label>
          <select id="${id}" data-path="${path}">
            ${options.map(option => `<option value="${attr(option)}"${option === value ? " selected" : ""}>${escapeHtml(option)}</option>`).join("")}
          </select>
        </div>
      `;
    }

    function dayOffsetField(path, value) {
      const id = path.replace(/[^a-zA-Z0-9]+/g, "_");
      const current = String(Number(value) || 0);
      const options = [["当日", "0"], ["次日", "1"], ["第3日", "2"]];
      return `<div class="field"><label class="label" for="${id}">日期</label><select id="${id}" data-path="${path}">${options.map(([label, option]) => `<option value="${option}"${option === current ? " selected" : ""}>${label}</option>`).join("")}</select></div>`;
    }

    function selectPairField(label, path, value, options) {
      const id = path.replace(/[^a-zA-Z0-9]+/g, "_");
      return `
        <div class="field">
          <label class="label" for="${id}">${label}</label>
          <select id="${id}" data-path="${path}">
            ${options.map(([name, symbol]) => `<option value="${attr(symbol)}"${symbol === value ? " selected" : ""}>${escapeHtml(name)} ${escapeHtml(symbol)}</option>`).join("")}
          </select>
        </div>
      `;
    }

    function renderDatalists() {
      return `
        ${datalist("diagnosisList", DIAGNOSIS_OPTIONS)}
        ${datalist("departmentList", DEPARTMENTS)}
        ${datalist("examList", EXAM_ITEMS)}
        ${datalist("tempList", TEMP_OPTIONS)}
        ${datalist("pulseList", PULSE_OPTIONS)}
        ${datalist("respList", RESP_OPTIONS)}
        ${datalist("bpList", BP_OPTIONS)}
        ${datalist("bpDiastolicList", BP_DIASTOLIC_OPTIONS)}
        ${datalist("spo2List", SPO2_OPTIONS)}
      `;
    }

    function datalist(id, options) {
      return `<datalist id="${id}">${options.map(item => `<option value="${attr(item)}"></option>`).join("")}</datalist>`;
    }

    function getTemplateLibrary() {
      state.templateLibrary = defaultTemplateLibrary(state.templateLibrary);
      return state.templateLibrary;
    }

    function templateOptions(type) {
      const base = {
        brief: BRIEF_TEMPLATES,
        medication: MEDICATIONS,
        treatment: TREATMENT_TEMPLATES
      }[type] || [];
      return uniqueList([...base, ...(getTemplateLibrary()[type] || [])]);
    }

    function templateCategory(type, text) {
      const value = String(text || "");
      if (type === "brief") return /外院|转入/.test(value) ? "转入病情" : /呛咳|异物/.test(value) ? "气道事件" : "心肺复苏";
      if (type === "medication") {
        if (/肾上腺素|多巴胺|间羟胺|乌拉地尔|硝酸甘油/.test(value)) return "循环与升压";
        if (/胺碘酮|利多卡因|阿托品|维拉帕米/.test(value)) return "心律失常";
        if (/GS|NS|葡萄糖|氯化钾|硫酸镁|葡萄糖酸钙/.test(value)) return "补液与电解质";
        return "其他抢救用药";
      }
      if (/插管|呼吸机|气道|吸痰/.test(value)) return "气道与呼吸";
      if (/胃管|尿管|置管/.test(value)) return "管路护理";
      if (/死亡|尸体/.test(value)) return "死亡处理";
      if (/结果|心电图|肌钙蛋白/.test(value)) return "检查结果";
      return "抢救处理";
    }

    function categorizedTemplateOptionsHtml(type) {
      const groups = new Map();
      templateOptions(type).forEach(item => {
        const category = templateCategory(type, item);
        if (!groups.has(category)) groups.set(category, []);
        groups.get(category).push(item);
      });
      return [...groups.entries()].map(([category, items]) => `<optgroup label="${attr(category)}">${items.map(item => `<option value="${attr(item)}">${escapeHtml(item)}</option>`).join("")}</optgroup>`).join("");
    }

    function uniqueList(items) {
      const seen = new Set();
      return items.map(item => String(item || "").trim()).filter(item => {
        if (!item || seen.has(item)) return false;
        seen.add(item);
        return true;
      });
    }

    function inferTemplateType(text) {
      const value = String(text || "");
      if (/(注射液|注射用|静脉注射|静脉滴注|肌内注射|缓慢静脉注射|泵入|组液|mg|ml|GS|NS|葡萄糖|肾上腺素|胺碘酮|呋塞米)/i.test(value)) return "medication";
      if (/(遵医嘱|协助医生|留置|床旁|宣告|尸体|告病危|签署|结果已告知|抢救用药|心肺复苏术|呼吸机)/.test(value)) return "treatment";
      return "brief";
    }

    function addTemplateFromPanel() {
      const textarea = document.getElementById("templateLibraryText");
      const select = document.getElementById("templateLibraryType");
      const text = textarea ? textarea.value.trim() : "";
      if (!text) {
        showToast("请先填写模板内容");
        return;
      }
      const selected = select ? select.value : "auto";
      const type = selected === "auto" ? inferTemplateType(text) : selected;
      addTemplateToLibrary(type, text);
      if (textarea) textarea.value = "";
    }

    function addTemplateToLibrary(type, text) {
      const value = String(text || "").trim();
      if (!value) {
        showToast("模板内容为空");
        return;
      }
      const library = getTemplateLibrary();
      if (!library[type]) type = inferTemplateType(value);
      if (templateOptions(type).includes(value)) {
        showToast("模板已存在");
        return;
      }
      library[type].push(value);
      meta.lastEdit = { type: "field", path: `templateLibrary.${type}` };
      markDirty();
      saveState(true);
      render();
      showToast(`已加入${templateTypeLabel(type)}`);
    }

    function deleteTemplate(type, index) {
      const library = getTemplateLibrary();
      if (!library[type] || !library[type][index]) return;
      const [value] = library[type].splice(index, 1);
      meta.lastClearedStep = { type: "field", path: `templateLibrary.${type}`, value };
      markDirty();
      saveState(true);
      render();
      showToast("已删除模板");
    }

    async function copyTemplateItem(type, index) {
      const library = getTemplateLibrary();
      const value = library[type] && library[type][index] ? String(library[type][index]) : "";
      if (!value) {
        showToast("暂无可复制内容");
        return;
      }
      const ok = await copyText(value);
      showToast(ok ? "模板内容已复制" : "复制失败，请手动长按复制");
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (error) {
        console.warn(error);
      }
      try {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "0";
        document.body.appendChild(textarea);
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);
        const ok = document.execCommand("copy");
        document.body.removeChild(textarea);
        return ok;
      } catch (error) {
        console.warn(error);
        return false;
      }
    }

    function saveCurrentTemplate(type) {
      const record = state.records[getActiveIndex("records")] || defaultRecord();
      const value = {
        brief: state.briefCondition,
        medication: record.medication,
        treatment: record.treatment
      }[type];
      addTemplateToLibrary(type, value);
    }

    function templateTypeLabel(type) {
      return { brief: "简要病情模板库", medication: "用药内容模板库", treatment: "病情及处理模板库" }[type] || "模板库";
    }

    function fillMedicationValue(index, value) {
      if (!state.records[index]) return;
      state.records[index].medication = value;
      meta.lastEdit = { type: "field", path: `records.${index}.medication` };
      markDirty();
      render();
      showToast("已填充用药内容");
    }

    function selectMedication(index, value) {
      fillMedicationValue(index, value);
    }

    function activeKeyFor(collection) {
      if (collection === "vitals") return "activeVitalIndex";
      if (collection === "records") return "activeRecordIndex";
      return "";
    }

    function getActiveIndex(collection) {
      const list = Array.isArray(state[collection]) ? state[collection] : [];
      const key = activeKeyFor(collection);
      if (!key || !list.length) return 0;
      const index = Number.isInteger(meta[key]) ? meta[key] : Number(meta[key] || 0);
      const safeIndex = Math.min(Math.max(index, 0), list.length - 1);
      meta[key] = safeIndex;
      return safeIndex;
    }

    function setActiveIndex(collection, index) {
      const key = activeKeyFor(collection);
      const list = Array.isArray(state[collection]) ? state[collection] : [];
      if (!key || !list.length) return;
      meta[key] = Math.min(Math.max(Number(index) || 0, 0), list.length - 1);
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    }

    function moveActiveRow(collection, step) {
      const list = Array.isArray(state[collection]) ? state[collection] : [];
      if (!list.length) return;
      const before = getActiveIndex(collection);
      const after = Math.min(Math.max(before + step, 0), list.length - 1);
      setActiveIndex(collection, after);
      render();
      showToast(`当前第 ${after + 1} 条 / 共 ${list.length} 条`);
    }

    function timeToMinutes(value) {
      const match = String(value || "").trim().match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
      if (!match) return Number.POSITIVE_INFINITY;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function timedRowMinutes(row) {
      const minutes = timeToMinutes(row.time);
      if (!Number.isFinite(minutes)) return Number.POSITIVE_INFINITY;
      return (Number(row.dayOffset) || 0) * 1440 + minutes;
    }

    function formatTimedRowTime(row) {
      const dayOffset = Number(row && row.dayOffset) || 0;
      const prefix = dayOffset === 1 ? "次日" : dayOffset > 1 ? `第${dayOffset + 1}日` : "";
      return `${prefix}${String(row && row.time || "")}`;
    }

    function sortTimedRows(collection, focusRow) {
      const list = Array.isArray(state[collection]) ? state[collection] : [];
      if (!list.length) return 0;
      const activeRow = focusRow || list[getActiveIndex(collection)];
      const sorted = list
        .map((row, originalIndex) => ({ row, originalIndex, minutes: timedRowMinutes(row) }))
        .sort((left, right) => left.minutes - right.minutes || left.originalIndex - right.originalIndex)
        .map(item => item.row);
      state[collection] = sorted;
      const activeIndex = activeRow ? sorted.indexOf(activeRow) : 0;
      const safeIndex = activeIndex >= 0 ? activeIndex : 0;
      setActiveIndex(collection, safeIndex);
      return safeIndex;
    }

    function handleFieldChange(event) {
      const target = event.target.closest("[data-path]");
      if (!target) return;
      const path = target.dataset.path;
      setByPath(path, target.value);
      const rowMatch = path.match(/^(vitals|records)\.(\d+)\./);
      if (rowMatch && state[rowMatch[1]][Number(rowMatch[2])]) {
        state[rowMatch[1]][Number(rowMatch[2])].updatedAt = new Date().toISOString();
      }
      if (path === "primaryNurse" && target.value.trim()) {
        state.primaryNurse = target.value.trim();
        applyPrimaryNurseSignature();
      }
      const nurseMatch = path.match(/^records\.(\d+)\.nurse$/);
      if (nurseMatch && target.value.trim()) {
        if (!state.primaryNurse) state.primaryNurse = target.value.trim();
        applyPrimaryNurseSignature();
      }
      const timeMatch = path.match(/^(vitals|records)\.(\d+)\.(time|dayOffset)$/);
      if (event.type === "change" && timeMatch) {
        const collection = timeMatch[1];
        const row = state[collection][Number(timeMatch[2])];
        const sortedIndex = sortTimedRows(collection, row);
        meta.lastEdit = { type: "field", path: `${collection}.${sortedIndex}.time` };
        markDirty();
        render();
        showToast("已按时间顺序排列");
        return;
      }
      meta.lastEdit = { type: "field", path };
      markDirty();
    }

    function handleTemplateSelection(event) {
      const briefSelect = event.target.closest("#briefTemplate");
      if (briefSelect && briefSelect.value) {
        fillBriefValue(briefSelect.value);
        return;
      }
      const medicationSelect = event.target.closest("[data-medication-template]");
      if (medicationSelect && medicationSelect.value) {
        fillMedicationValue(Number(medicationSelect.dataset.medicationTemplate), medicationSelect.value);
        return;
      }
      const treatmentSelect = event.target.closest("[data-template-select]");
      if (treatmentSelect && treatmentSelect.value) {
        fillTreatmentValue(Number(treatmentSelect.dataset.templateSelect), treatmentSelect.value);
      }
    }

    function handleAction(event) {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const action = button.dataset.action;
      if (action === "load-sample") loadSample();
      if (action === "add-consult") addRow("consults", defaultConsult());
      if (action === "add-exam") addRow("exams", defaultExam());
      if (action === "add-vital") addVital();
      if (action === "add-record") addRecordRow();
      if (action === "delete-row") deleteRow(button.dataset.collection, Number(button.dataset.index));
      if (action === "add-template") addTemplateFromPanel();
      if (action === "copy-template-item") copyTemplateItem(button.dataset.templateType, Number(button.dataset.index));
      if (action === "delete-template") deleteTemplate(button.dataset.templateType, Number(button.dataset.index));
      if (action === "save-current-template") saveCurrentTemplate(button.dataset.templateType);
      if (action === "prev-row") moveActiveRow(button.dataset.collection, -1);
      if (action === "next-row") moveActiveRow(button.dataset.collection, 1);
      if (action === "select-medication") selectMedication(Number(button.dataset.index), button.dataset.medication);
      if (action === "backup-record") backupRecordJson();
      if (action === "import-record") document.getElementById("recordImportInput").click();
      if (action === "new-patient") newPatientRecord();
    }

    function fillBriefValue(value) {
      state.briefCondition = value;
      meta.lastEdit = { type: "field", path: "briefCondition" };
      markDirty();
      render();
      showToast("已覆盖简要病情");
    }

    function primaryNurseSignature() {
      if (String(state.primaryNurse || "").trim()) return String(state.primaryNurse).trim();
      const signedRecord = state.records.find(record => String(record.nurse || "").trim());
      state.primaryNurse = signedRecord ? String(signedRecord.nurse).trim() : "";
      return state.primaryNurse;
    }

    function applyPrimaryNurseSignature() {
      const firstSignature = primaryNurseSignature();
      if (!firstSignature) return;
      state.records.forEach(record => {
        if (!String(record.nurse || "").trim()) record.nurse = firstSignature;
      });
    }

    function fillTreatmentValue(index, value) {
      if (!state.records[index]) return;
      state.records[index].treatment = value;
      meta.lastEdit = { type: "field", path: `records.${index}.treatment` };
      markDirty();
      render();
      showToast("已填充病情及处理");
    }

    function addVital() {
      const first = state.vitals[0] || defaultVital();
      const previous = state.vitals[state.vitals.length - 1] || defaultVital();
      const nextTimeInfo = nextTimedRowInfo(previous);
      const next = defaultVital({
        ...first,
        id: createId("vital"),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        time: nextTimeInfo.time,
        dayOffset: nextTimeInfo.dayOffset,
        temp: ""
      });
      addRow("vitals", next);
    }

    function addRecordRow() {
      const previous = state.records[state.records.length - 1] || defaultRecord();
      const nextTimeInfo = nextTimedRowInfo(previous, true);
      addRow("records", defaultRecord({ time: nextTimeInfo.time, dayOffset: nextTimeInfo.dayOffset, nurse: primaryNurseSignature() }));
    }

    function nextTimedRowInfo(previous, useCurrentTime = false) {
      const previousTime = String(previous.time || "");
      const nextTime = addMinutesToTime(previousTime, 10) || (useCurrentTime ? nowTime() : "");
      let dayOffset = Number(previous.dayOffset) || 0;
      if (previousTime && nextTime && timeToMinutes(nextTime) < timeToMinutes(previousTime)) dayOffset += 1;
      return { time: nextTime, dayOffset };
    }

    function addRow(collection, row) {
      state[collection].push(row);
      let index = state[collection].length - 1;
      if (collection === "vitals" || collection === "records") {
        index = sortTimedRows(collection, row);
      }
      setActiveIndex(collection, index);
      meta.lastEdit = { type: "row-add", collection, index, rowId: row.id };
      meta.highlightRowId = row.id;
      markDirty();
      render();
      showToast("已新增");
    }

    function deleteRow(collection, index) {
      if (!Array.isArray(state[collection]) || !state[collection][index]) return;
      if (!window.confirm("确定删除当前记录吗？删除后可通过“恢复上一步”找回。")) return;
      if (state[collection].length === 1) {
        const previous = clone(state[collection][0]);
        state[collection][0] = defaultRowFor(collection);
        meta.lastClearedStep = { type: "field", path: `${collection}.0`, value: previous };
        setActiveIndex(collection, 0);
      } else {
        const [row] = state[collection].splice(index, 1);
        meta.lastClearedStep = { type: "row", collection, index, row };
        setActiveIndex(collection, Math.min(index, state[collection].length - 1));
      }
      meta.lastEdit = null;
      markDirty();
      saveState(true);
      render();
      showToast("已删除，可恢复上一步");
    }

    function loadSample() {
      const sample = defaultState();
      sample.patient = {
        admissionDateTime: toDatetimeLocal(new Date()),
        firstDoctor: "值班医生",
        doctorArrivalTime: nowTime(),
        bedNo: "1",
        name: "",
        sex: "男",
        age: "",
        idNo: "",
        diagnosis: "呼吸心跳骤停",
        contact: "",
        arrivalMode: "120"
      };
      sample.rescueTimes.deathTime = "";
      sample.briefCondition = BRIEF_TEMPLATES[2];
      sample.consults = [defaultConsult({ department: "ICU", notifyTime: nowTime(), consultTime: nowTime(), doctor: "值班医生" })];
      sample.vitals = [
        defaultVital({ time: nowTime(), temp: "36.0℃", pulse: "测不出", respiration: "辅助通气", bpSystolic: "", bpDiastolic: "", bp: "", spo2: "测不出", consciousness: "+++", leftPupil: "5.0", leftReflect: "-", rightPupil: "5.0", rightReflect: "-" })
      ];
      sample.records = [
        defaultRecord({ time: nowTime(), medication: MEDICATIONS[0], treatment: TREATMENT_TEMPLATES[2], nurse: "" }),
        defaultRecord({ time: nowTime(), medication: MEDICATIONS[2], treatment: TREATMENT_TEMPLATES[3], nurse: "" }),
        defaultRecord({ time: nowTime(), medication: "", treatment: TREATMENT_TEMPLATES[4], nurse: "" })
      ];
      state = sample;
      meta.activeVitalIndex = 0;
      meta.activeRecordIndex = 0;
      meta.lastEdit = { type: "field", path: "briefCondition" };
      markDirty();
      render();
      showToast("已载入样例，可继续修改");
    }

    function clearStep() {
      const edit = meta.lastEdit;
      if (!edit) {
        showToast("没有可清空的上一步");
        return;
      }
      if (edit.type === "field") {
        const value = getByPath(edit.path);
        if (isEmptyValue(value)) {
          showToast("上一步内容已经为空");
          return;
        }
        meta.lastClearedStep = { type: "field", path: edit.path, value: clone(value) };
        setByPath(edit.path, emptyLike(value));
      }
      if (edit.type === "row-add") {
        const list = state[edit.collection];
        const rowIndex = Array.isArray(list) ? list.findIndex(row => row.id === edit.rowId) : -1;
        const targetIndex = rowIndex >= 0 ? rowIndex : edit.index;
        if (!Array.isArray(list) || !list[targetIndex]) {
          showToast("上一步记录不存在");
          return;
        }
        const [row] = list.splice(targetIndex, 1);
        if (!list.length) list.push(defaultRowFor(edit.collection));
        setActiveIndex(edit.collection, Math.min(targetIndex, list.length - 1));
        meta.lastClearedStep = { type: "row", collection: edit.collection, index: targetIndex, row };
      }
      meta.lastEdit = null;
      markDirty();
      saveState(true);
      render();
      showToast("已清空上一步");
    }

    function restoreStep() {
      const item = meta.lastClearedStep;
      if (!item) {
        showToast("没有可恢复的上一步");
        return;
      }
      if (item.type === "field") {
        setByPath(item.path, clone(item.value));
      }
      if (item.type === "row") {
        if (!Array.isArray(state[item.collection])) state[item.collection] = [];
        state[item.collection].splice(Math.min(item.index, state[item.collection].length), 0, clone(item.row));
        setActiveIndex(item.collection, item.index);
      }
      meta.lastEdit = null;
      meta.lastClearedStep = null;
      markDirty();
      saveState(true);
      render();
      showToast("已恢复上一步");
    }

      const patientName = String(state.patient.name || "未填写姓名");
      if (!window.confirm(`确定清空患者“${patientName}”的全部记录吗？模板库将保留。`)) return;
      meta.lastClearedAll = clone(state);
      meta.lastEdit = null;
      meta.lastClearedStep = null;
      const preservedTemplateLibrary = clone(getTemplateLibrary());
      state = defaultState();
      state.templateLibrary = defaultTemplateLibrary(preservedTemplateLibrary);
      meta.activeVitalIndex = 0;
      meta.activeRecordIndex = 0;
      markDirty();
      saveState(true);
      render();
      showToast("已清空全部，可恢复全部");

    function restoreAll() {
      if (!meta.lastClearedAll) {
        showToast("没有可恢复的全部内容");
        return;
      }
      state = sanitizeState(meta.lastClearedAll);
      meta.activeVitalIndex = 0;
      meta.activeRecordIndex = 0;
      meta.lastClearedAll = null;
      meta.lastEdit = null;
      markDirty();
      saveState(true);
      render();
      showToast("已恢复全部");
    }

      clearTimeout(autoSaveTimer);
      updateStatus("保存中");

      sortTimedRows("records");
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      meta.dirty = false;
      localStorage.setItem(META_KEY, JSON.stringify(meta));

      if (!silent) showToast("保存成功");

    async function exportImages() {
      const warnings = validateRecord();
      if (warnings.length && !window.confirm(`导出前发现以下问题：\n\n${warnings.map(item => `• ${item}`).join("\n")}\n\n仍要继续导出吗？`)) return;
      saveState(true);

        let remoteError = "";

        if (canUseRemoteExport()) {
          imageExportList.innerHTML = `<div class="image-export-card">图片已生成，正在提交微信导出服务...</div>`;
          try {
            remoteExport = await uploadImagesToExportService(images);

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    async function buildPdfFromImages(images) {
      const jpegPages = [];
      for (const item of images) {
        jpegPages.push(await imageExportToJpegPage(item));
      }
      return new Blob([createPdfBytes(jpegPages)], { type: "application/pdf" });
    }

    async function imageExportToJpegPage(item) {
      const image = await loadImage(item.dataUrl);
      const width = image.naturalWidth || image.width;
      const height = image.naturalHeight || image.height;
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d");
      context.fillStyle = "#fff";
      context.fillRect(0, 0, width, height);
      context.drawImage(image, 0, 0, width, height);
      return {
        width,
        height,
        bytes: dataUrlToBytes(canvas.toDataURL("image/jpeg", 0.92))
      };
    }

    function dataUrlToBytes(dataUrl) {
      const base64 = dataUrl.split(",")[1] || "";
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function createPdfBytes(pages) {
      const encoder = new TextEncoder();
      const chunks = [];
      const offsets = [0];
      let offset = 0;
      const pageWidth = "595.28";
      const pageHeight = "841.89";
      const totalObjects = 2 + pages.length * 3;

      const pushBytes = bytes => {
        chunks.push(bytes);
        offset += bytes.length;
      };
      const pushText = text => pushBytes(encoder.encode(text));
      const addObject = (number, body) => {
        offsets[number] = offset;
        pushText(`${number} 0 obj\n${body}\nendobj\n`);
      };

      pushText("%PDF-1.4\n");
      addObject(1, "<< /Type /Catalog /Pages 2 0 R >>");
      addObject(2, `<< /Type /Pages /Kids [${pages.map((_, index) => `${3 + index * 3} 0 R`).join(" ")}] /Count ${pages.length} >>`);

      pages.forEach((page, index) => {
        const pageObject = 3 + index * 3;
        const contentObject = pageObject + 1;
        const imageObject = pageObject + 2;
        const imageName = `Im${index + 1}`;
        const content = `q\n${pageWidth} 0 0 ${pageHeight} 0 0 cm\n/${imageName} Do\nQ`;

        addObject(
          pageObject,
          `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /XObject << /${imageName} ${imageObject} 0 R >> >> /Contents ${contentObject} 0 R >>`
        );
        addObject(contentObject, `<< /Length ${encoder.encode(content).length} >>\nstream\n${content}\nendstream`);

        offsets[imageObject] = offset;
        pushText(`${imageObject} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${page.width} /Height ${page.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${page.bytes.length} >>\nstream\n`);
        pushBytes(page.bytes);
        pushText("\nendstream\nendobj\n");
      });

      const xrefOffset = offset;
      pushText(`xref\n0 ${totalObjects + 1}\n0000000000 65535 f \n`);
      for (let number = 1; number <= totalObjects; number += 1) {
        pushText(`${String(offsets[number]).padStart(10, "0")} 00000 n \n`);
      }
      pushText(`trailer\n<< /Size ${totalObjects + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);
      return concatByteArrays(chunks);
    }

    function concatByteArrays(chunks) {
      const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
      const output = new Uint8Array(totalLength);
      let cursor = 0;
      chunks.forEach(chunk => {
        output.set(chunk, cursor);
        cursor += chunk.length;
      });
      return output;
    }

    function formatFileSize(size) {
      if (!Number.isFinite(size) || size <= 0) return "";
      if (size < 1024) return `${size}B`;
      const kb = size / 1024;
      if (kb < 1024) return `${kb >= 100 ? kb.toFixed(0) : kb.toFixed(1)}KB`;
      const mb = kb / 1024;
      return `${mb >= 10 ? mb.toFixed(1) : mb.toFixed(2)}MB`;
    }

    function getExportApiBaseUrl() {
      if (!REMOTE_EXPORT_CONFIG.apiBaseUrl) return "";
      try {
        const url = new URL(REMOTE_EXPORT_CONFIG.apiBaseUrl, window.location.href);
        if (url.protocol !== "https:" && !["localhost", "127.0.0.1"].includes(url.hostname)) return "";
        return url.toString().replace(/\/+$/, "");
      } catch (_) {
        return "";
      }
    }

    function canUseRemoteExport() {
      const isSecurePage = window.location.protocol === "https:" || ["localhost", "127.0.0.1"].includes(window.location.hostname);
      return isSecurePage && Boolean(getExportApiBaseUrl());
    }

    function getWechatClient() {
      const ua = navigator.userAgent || "";
      return {
        isWechat: /MicroMessenger/i.test(ua),
        isAndroid: /Android/i.test(ua),
        isIOS: /iPhone|iPad|iPod/i.test(ua)
      };
    }

    function dataUrlToBlob(dataUrl, type = "application/octet-stream") {
      return new Blob([dataUrlToBytes(dataUrl)], { type });
    }

    async function uploadImagesToExportService(images) {
      const apiBaseUrl = getExportApiBaseUrl();
      if (!apiBaseUrl) throw new Error("未配置微信导出服务");

      const formData = new FormData();
      formData.append("filename", exportBaseFilename());
      images.forEach(item => {
        formData.append(
          "pages",
          dataUrlToBlob(item.dataUrl, "image/png"),
          `${exportBaseFilename()}_第${item.pageNo}页.png`
        );
      });

      const controller = typeof AbortController === "function" ? new AbortController() : null;
      const timer = controller ? window.setTimeout(() => controller.abort(), REMOTE_EXPORT_CONFIG.timeoutMs) : null;
      try {
        const response = await fetch(`${apiBaseUrl}/api/exports/rescue-record`, {
          method: "POST",
          body: formData,
          credentials: "omit",
          signal: controller ? controller.signal : undefined
        });
        let payload = null;
        try {
          payload = await response.json();
        } catch (_) {
          // 服务端错误不会包含病历正文，前端无需继续解析响应文本。
        }
        if (!response.ok || !payload || !payload.pdfUrl || !Array.isArray(payload.pages)) {
          throw new Error(payload && payload.error ? payload.error : "导出服务返回无效结果");
        }
        return payload;
      } finally {
        if (timer) window.clearTimeout(timer);
      }
    }

    function formatExportExpiry(value) {
      const date = new Date(value || "");
      if (Number.isNaN(date.getTime())) return "30 分钟后";
      return `${date.getMonth() + 1}月${date.getDate()}日 ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function updateExportServiceHint(isRemote) {
      const hint = document.getElementById("exportServiceHint");
      if (!hint) return;
      if (isRemote) {
        hint.textContent = "微信内可打开图片后长按保存；PDF 可打开预览，Android 微信可直接下载。导出文件仅临时保留 30 分钟。";
        return;
      }
      hint.textContent = canUseRemoteExport()
        ? "导出服务暂时不可用，当前为本地预览；图片可长按保存，PDF 请使用浏览器打开。"
        : "当前为本地预览。部署 HTTPS 导出服务后，微信内可保存图片并打开或下载 PDF。";
    }

    function showImageExport(images, delivery, warnings = []) {
      const baseFilename = exportBaseFilename();
      const remoteExport = delivery && delivery.remoteExport;
      const localPdfUrl = delivery && delivery.localPdfUrl;
      const localPdfSize = delivery && delivery.localPdfSize;
      const client = getWechatClient();
      const isRemote = Boolean(remoteExport);
      const pdfUrl = isRemote ? remoteExport.pdfUrl : localPdfUrl;
      const pdfDownloadUrl = isRemote ? (remoteExport.downloadPdfUrl || remoteExport.pdfUrl) : localPdfUrl;

      updateExportServiceHint(isRemote);
      const imageCards = images.map(item => `
        ${(() => {
          const remotePage = isRemote ? remoteExport.pages.find(page => Number(page.pageNo) === Number(item.pageNo)) : null;
          const previewUrl = (remotePage && remotePage.previewUrl) || item.dataUrl;
          const downloadUrl = (remotePage && remotePage.downloadUrl) || item.dataUrl;
          const actions = client.isWechat
            ? `<a class="image-download" href="${attr(previewUrl)}" target="_blank" rel="noopener">打开图片并长按保存 第${item.pageNo}页</a>`
            : `<a class="image-download" href="${attr(downloadUrl)}" download="${attr(`${baseFilename}_第${item.pageNo}页.png`)}">下载图片 第${item.pageNo}页</a>
               <a class="image-download" href="${attr(previewUrl)}" target="_blank" rel="noopener">打开图片 第${item.pageNo}页</a>`;
          return `
        <div class="image-export-card">
          <img src="${attr(previewUrl)}" alt="急诊抢救记录单第${item.pageNo}页">
          <div class="image-export-actions">
            ${actions}
          </div>
        </div>
          `;
        })()}
      `).join("");
      const pdfActions = client.isWechat
        ? `${client.isAndroid ? `<a class="image-download" href="${attr(pdfDownloadUrl)}" target="_blank" rel="noopener">下载PDF</a>` : ""}
           <a class="image-download" href="${attr(pdfUrl)}" target="_blank" rel="noopener">打开PDF预览</a>`
        : `<a class="image-download" href="${attr(pdfDownloadUrl)}" download="${attr(`${baseFilename}.pdf`)}">下载PDF</a>
           <a class="image-download" href="${attr(pdfUrl)}" target="_blank" rel="noopener">打开PDF预览</a>`;
      const deliveryText = isRemote
        ? `已生成 ${images.length} 页微信导出文件，PDF ${formatFileSize(remoteExport.pdfSize || 0)}。文件将于 ${formatExportExpiry(remoteExport.expiresAt)} 自动删除。`
        : `已生成 ${images.length} 页本地预览，PDF ${formatFileSize(localPdfSize || 0)}。${delivery && delivery.remoteError ? delivery.remoteError : ""}`;
      imageExportList.innerHTML = `
        <div class="image-export-card export-summary">
          <strong>已生成 ${images.length} 页导出预览</strong>
          <p>${escapeHtml(deliveryText)}</p>
          ${warnings.length ? `<p class="export-warning">导出提醒：${warnings.map(escapeHtml).join("；")}</p>` : `<p>关键字段检查通过。</p>`}
          <div class="image-export-actions">
            ${pdfActions}
          </div>
        </div>
        ${imageCards}
      `;
    }

    function revokeExportPdfUrl() {
      if (!currentPdfUrl) return;
      URL.revokeObjectURL(currentPdfUrl);
      currentPdfUrl = "";
    }

    function closeImageExport() {
      imageExportSheet.hidden = true;
      imageExportList.innerHTML = "";
      revokeExportPdfUrl();
    }

    async function renderCanvasImages() {
      const assets = {
        badge: await loadImage(HOSPITAL_BADGE_SRC),
        hospital: await loadImage(HOSPITAL_HEADER_SRC)
      };
      const vitalsGroups = chunk(state.vitals.length ? state.vitals : [defaultVital()], 12);
      const recordGroups = paginateCanvasRecordRows(state.records.length ? state.records : [defaultRecord()]);
      const images = [];
      let pageNo = 1;
      images.push(drawCanvasPage(pageNo, context => drawFirstCanvasPage(context, assets, vitalsGroups[0] || [], pageNo)));
      pageNo += 1;
      for (const group of vitalsGroups.slice(1)) {
        const current = pageNo;
        images.push(drawCanvasPage(current, context => drawVitalsCanvasPage(context, assets, group, current)));
        pageNo += 1;
        await yieldToBrowser();
      }
      for (const group of recordGroups) {
        const current = pageNo;
        images.push(drawCanvasPage(current, context => drawRecordCanvasPage(context, group, current)));
        pageNo += 1;
        await yieldToBrowser();
      }
      return images;
    }

    function yieldToBrowser() {
      return new Promise(resolve => requestAnimationFrame(() => setTimeout(resolve, 0)));
    }

    function drawCanvasPage(pageNo, draw) {
      const width = 794;
      const height = 1123;
      const scale = 2;
      const canvas = document.createElement("canvas");
      canvas.width = width * scale;
      canvas.height = height * scale;
      const context = canvas.getContext("2d");
      context.scale(scale, scale);
      context.fillStyle = "#fff";
      context.fillRect(0, 0, width, height);
      context.strokeStyle = "#000";
      context.fillStyle = "#000";
      context.lineWidth = 1;
      draw(context);
      return {
        pageNo,
        filename: `急诊抢救记录单_第${pageNo}页.png`,
        dataUrl: canvas.toDataURL("image/png")
      };
    }

    function canvasBriefRows(context, text, width) {
      const cleaned = String(text || "").replace(/^[\s\u3000\u200B-\u200D\uFEFF]+/, "");
      const rows = wrapBriefCanvasTextLines(context, cleaned, width);
      while (rows.length > 1 && !String(rows[0] || "").trim()) rows.shift();
      while (rows.length < 3) rows.push("");
      return rows;
    }

    function drawBriefCanvasTable(context, x, y, width, rows) {
      const prefix = "简要病情记录：";
      const pad = 7;
      const firstRowHeight = 34;
      const contentFontSize = 14;
      context.save();
      context.fillStyle = "#fff";
      context.fillRect(x, y, width, firstRowHeight);
      context.strokeStyle = "#000";
      context.lineWidth = 1;
      context.strokeRect(x, y, width, firstRowHeight);
      drawTextLine(context, prefix, x + pad, y + (firstRowHeight - 19) / 2 + 19, 19, true, "left", "serif");
      setCanvasFont(context, 19, true, "serif");
      const prefixWidth = context.measureText(prefix).width + 6;
      drawTextLine(context, rows[0] || "", x + pad + prefixWidth, y + (firstRowHeight - contentFontSize) / 2 + contentFontSize, contentFontSize, false, "left", "serif");
      context.restore();

      const bodyRows = rows.slice(1);
      if (bodyRows.length) {
        drawTable(context, x, y + firstRowHeight, [width], bodyRows.map(() => 28), bodyRows.map(line => [
          textCell(line, 1, { align: "left", fontSize: contentFontSize, pad, lineHeight: 18 })

    function paginateCanvasRecordRows(records) {
      const context = document.createElement("canvas").getContext("2d");
      const visualRows = records.flatMap(record => splitRecordToCanvasRows(context, record));
      const groups = chunk(visualRows.length ? visualRows : [defaultRecord()], 34);
      return groups.length ? groups : [[defaultRecord()]];
    }

    function splitRecordToCanvasRows(context, record) {
      const colWidths = [66, 172, 398, 86];
      const rowHeight = 28;
      const textOptions = { fontSize: 12, pad: 5 };
      const linesPerCell = 1;
      const medicationLines = wrapCanvasTextLines(context, record.medication || "", colWidths[1], textOptions);
      const treatmentLines = wrapCanvasTextLines(context, record.treatment || "", colWidths[2], textOptions);
      const rowCount = Math.max(1, Math.ceil(medicationLines.length / linesPerCell), Math.ceil(treatmentLines.length / linesPerCell));
      return Array.from({ length: rowCount }, (_, index) => ({
        time: index === 0 ? formatTimedRowTime(record) : "",
        medication: medicationLines.slice(index * linesPerCell, (index + 1) * linesPerCell).join("\n"),
        treatment: treatmentLines.slice(index * linesPerCell, (index + 1) * linesPerCell).join("\n"),

      const pad = options.pad ?? 4;

    function wrapBriefCanvasTextLines(context, text, width) {
      const prefix = "简要病情记录：";
      const pad = 7;
      const fontSize = 14;
      setCanvasFont(context, 19, true, "serif");
      const prefixWidth = context.measureText(prefix).width + 6;
      setCanvasFont(context, fontSize, false, "serif");
      const firstWidth = width - pad * 2 - prefixWidth;
      const fullWidth = width - pad * 2;
      const lines = [];
      String(text || "").split("\n").forEach(part => {
        if (!part) {
          if (lines.length) lines.push("");
          return;
        }
        let line = "";
        Array.from(part).forEach(char => {
          const availableWidth = lines.length ? fullWidth : firstWidth;
          const next = line + char;
          if (line && context.measureText(next).width > availableWidth) {
            lines.push(line);
            line = char;
          } else {
            line = next;
          }
        });
        lines.push(line);
      });
      return lines.filter((line, index) => line || index === 0);
    }

    function wrapCanvasTextLines(context, text, width, options = {}) {
      const pad = options.pad ?? 4;
      const fontSize = options.fontSize || 13;
      setCanvasFont(context, fontSize, options.bold, options.family);
      const availableWidth = width - pad * 2;
      const lines = [];
      String(text || "").split("\n").forEach(part => {
        if (!part) {
          lines.push("");
          return;
        }
        let line = "";
        Array.from(part).forEach(char => {
          const next = line + char;
          if (line && context.measureText(next).width > availableWidth) {
            lines.push(line);
            line = char;
          } else {
            line = next;

      return lines.filter((line, index) => line || index === 0);

    function drawTable(context, x, y, colWidths, rowHeights, rows) {
      let currentY = y;
      rows.forEach((row, rowIndex) => {
        let currentX = x;
        let colIndex = 0;
        const rowHeight = rowHeights[rowIndex] || rowHeights[rowHeights.length - 1] || 30;
        row.forEach(cellInput => {
          const cell = typeof cellInput === "object" ? cellInput : textCell(cellInput, 1, { align: "center" });
          const span = cell.colSpan || 1;
          const cellWidth = colWidths.slice(colIndex, colIndex + span).reduce((sum, item) => sum + item, 0);
          drawCell(context, currentX, currentY, cellWidth, rowHeight, cell);
          currentX += cellWidth;
          colIndex += span;
        });
        currentY += rowHeight;
      });
    }

    function drawCell(context, x, y, width, height, cell) {
      context.save();
      context.strokeStyle = "#000";
      context.lineWidth = 1;
      context.fillStyle = "#fff";
      context.fillRect(x, y, width, height);
      context.strokeRect(x, y, width, height);
      context.fillStyle = "#000";
      if (cell.arrivalModes) {
        drawArrivalModesCell(context, x, y, width, height, cell);
      } else if (cell.diagonal) {
        context.beginPath();
        context.moveTo(x, y + height);
        context.lineTo(x + width, y);
        context.stroke();
        drawTextLine(context, cell.diagonal[0] || "", x + width * 0.31, y + height * 0.32 + (cell.fontSize || 11) * 0.35, cell.fontSize || 11, cell.bold, "center");
        drawTextLine(context, cell.diagonal[1] || "", x + width * 0.72, y + height * 0.76 + (cell.fontSize || 11) * 0.35, cell.fontSize || 11, cell.bold, "center");
      } else {
        drawWrappedText(context, cell.text || "", x, y, width, height, cell);
      }
      context.restore();
    }

    function drawArrivalModesCell(context, x, y, width, height, cell) {
      const pad = 7;
      const boxSize = 9;
      const gap = 4;
      const itemGap = 12;
      const fontSize = cell.fontSize || 13;
      let currentX = x + pad;
      const boxY = y + (height - boxSize) / 2;
      const textY = y + (height - fontSize) / 2 + fontSize;
      setCanvasFont(context, fontSize, false, "serif");
      context.strokeStyle = "#000";
      context.fillStyle = "#000";
      context.lineWidth = 1;
      cell.arrivalModes.forEach(item => {
        context.strokeRect(currentX, boxY, boxSize, boxSize);
        if (item === cell.selected) {
          context.save();
          context.lineWidth = 1.2;
          context.beginPath();
          context.moveTo(currentX + 2, boxY + 5);
          context.lineTo(currentX + 4, boxY + 7);
          context.lineTo(currentX + 8, boxY + 2);
          context.stroke();
          context.restore();
        }
        context.textAlign = "left";
        context.textBaseline = "alphabetic";
        context.fillText(item, currentX + boxSize + gap, textY);
        currentX += boxSize + gap + context.measureText(item).width + itemGap;
      });
    }

    function drawWrappedText(context, text, x, y, width, height, options = {}) {
      const pad = options.pad ?? 4;
      const fontSize = options.fontSize || 13;
      const lineHeight = options.lineHeight || Math.ceil(fontSize * 1.28);
      setCanvasFont(context, fontSize, options.bold, options.family);
      const raw = String(text || "");
      const lines = [];
      raw.split("\n").forEach(part => {
        let line = "";
        Array.from(part).forEach(char => {
          const next = line + char;
          if (line && context.measureText(next).width > width - pad * 2) {
            lines.push(line);
            line = char;
          } else {
            line = next;
          }
        });
        lines.push(line);
      });
      const maxLines = Math.max(1, Math.floor((height - pad * 2) / lineHeight));
      const visible = lines.slice(0, maxLines);
      if (lines.length > maxLines && visible.length) {
        let last = visible[visible.length - 1];
        while (last && context.measureText(`${last}...`).width > width - pad * 2) last = last.slice(0, -1);
        visible[visible.length - 1] = `${last}...`;
      }
      const totalHeight = visible.length * lineHeight;
      const middleAligned = options.valign === "middle" || options.valign === "center";
      const startY = options.valign === "top" || (!middleAligned && visible.length > 1) ? y + pad + fontSize : y + (height - totalHeight) / 2 + fontSize;
      context.textAlign = options.align || "left";
      context.textBaseline = "alphabetic";
      visible.forEach((line, index) => {
        const drawX = options.align === "center" ? x + width / 2 : options.align === "right" ? x + width - pad : x + pad;
        context.fillText(line, drawX, startY + index * lineHeight);
      });
    }

    function drawTextLine(context, text, x, y, fontSize = 13, bold = false, align = "left", family = "serif") {
      setCanvasFont(context, fontSize, bold, family);
      context.fillStyle = "#000";
      context.textAlign = align;

      context.fillText(String(text || ""), x, y);

    function splitBloodPressure(value) {
      const text = String(value || "").trim();

      const parts = text.split(/[\\/／]/).map(item => item.trim()).filter(Boolean);
      if (parts.length >= 2) return [parts[0], parts.slice(1).join("/")];
      return [text, ""];
    }

    function bloodPressureParts(row) {
      const systolic = String(row?.bpSystolic || "").trim();
      const diastolic = String(row?.bpDiastolic || "").trim();
      if (systolic || diastolic) return [systolic, diastolic];
      return splitBloodPressure(row?.bp);
    }

    function formatBloodPressure(systolic, diastolic) {
      const top = String(systolic || "").trim();
      const bottom = String(diastolic || "").trim();
      if (top && bottom) return `${top}/${bottom}`;
      return top || bottom;
    }

    function syncBloodPressurePath(path) {
      const match = path.match(/^vitals\.(\d+)\.(bpSystolic|bpDiastolic)$/);
      if (!match) return;
      const row = state.vitals[Number(match[1])];
      if (!row) return;
      row.bp = formatBloodPressure(row.bpSystolic, row.bpDiastolic);

    function paginateRecords(records) {
