      records.forEach(record => {
        const size = Math.max(1, Math.ceil((record.medication || "").length / 18), Math.ceil((record.treatment || "").length / 34));
        if (current.length && used + size > 22) {
          groups.push(current);
          current = [];
          used = 0;
        }
        current.push(record);
        used += size;
      });
      if (current.length) groups.push(current);
      return groups.length ? groups : [[defaultRecord()]];
    }

      const safeName = String(state.patient.name || "未命名").trim().replace(/[\\/:*?"<>|]/g, "_");
      const dateText = String(state.patient.admissionDateTime || "").replace(/\D/g, "").slice(0, 12) || new Date().toISOString().replace(/\D/g, "").slice(0, 12);
      return `急诊抢救记录单_${safeName}_${dateText}`;
    }

    function validateRecord() {
      const warnings = [];
      if (!String(state.patient.name || "").trim()) warnings.push("患者姓名未填写");
      if (!state.patient.admissionDateTime) warnings.push("入院时间未填写");
      if (!String(state.patient.diagnosis || "").trim()) warnings.push("入院诊断未填写");
      if (!primaryNurseSignature()) warnings.push("护士签名未填写");
      if (!state.vitals.some(row => row.time)) warnings.push("生命体征时间未填写");
      state.consults.forEach((row, index) => {
        if (row.notifyTime && row.consultTime && timeToMinutes(row.consultTime) < timeToMinutes(row.notifyTime)) warnings.push(`会诊${index + 1}的会诊时间早于通知时间`);
      });
      if (state.rescueTimes.deathTime && state.rescueTimes.bodyCareTime && timeToMinutes(state.rescueTimes.bodyCareTime) < timeToMinutes(state.rescueTimes.deathTime)) warnings.push("尸体处理时间早于死亡时间");
      return warnings;
    }

    function backupRecordJson() {
      saveState(true);
      const payload = { version: 3, exportedAt: new Date().toISOString(), state, meta: { uiVersion: UI_VERSION } };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${exportBaseFilename()}_备份.json`;
      link.click();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
      showToast("记录备份已生成");
    }

    async function importRecordBackup(event) {
      const file = event.target.files && event.target.files[0];
      event.target.value = "";
      if (!file) return;
      try {
        const payload = JSON.parse(await file.text());
        const imported = payload && payload.state ? payload.state : payload;
        if (!imported || typeof imported !== "object" || !imported.patient) throw new Error("invalid");
        if (!window.confirm("导入后会覆盖当前患者记录，但保留当前模板库。确定继续吗？")) return;
        const preservedTemplates = clone(getTemplateLibrary());
        state = sanitizeState(imported);
        state.templateLibrary = defaultTemplateLibrary(preservedTemplates);
        meta.activeVitalIndex = 0;
        meta.activeRecordIndex = 0;
        saveState(true);
        render();
        showToast("记录导入成功");
      } catch {
        showToast("导入失败：文件格式不正确");
      }
    }

    function archiveCurrentRecord() {
      if (!state.patient.name && !state.briefCondition && !state.records.some(row => row.medication || row.treatment)) return;
      let archive = [];
      try { archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || "[]"); } catch { archive = []; }
      archive.unshift({ archivedAt: new Date().toISOString(), state: clone(state) });
      localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive.slice(0, 20)));
    }

    function newPatientRecord() {
      const patientName = String(state.patient.name || "未填写姓名");
      if (!window.confirm(`新建患者记录前将自动备份“${patientName}”的当前内容，确定继续吗？`)) return;
      archiveCurrentRecord();
      const templates = clone(getTemplateLibrary());
      state = defaultState();
      state.templateLibrary = defaultTemplateLibrary(templates);
      meta.activeView = "patient";
      meta.activeVitalIndex = 0;
      meta.activeRecordIndex = 0;
      saveState(true);
      render();
      showToast("已新建患者记录，上一份已自动备份");
    }

    function handleKeyboardShortcuts(event) {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
        event.preventDefault();
        saveState(false);
        return;
      }
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        event.preventDefault();
        if (meta.activeView === "vitals") addVital();
        if (meta.activeView === "records") addRecordRow();
        return;
      }
      if (event.altKey && /^[1-6]$/.test(event.key)) {
        event.preventDefault();
        setActiveView(Object.keys(VIEW_LABELS)[Number(event.key) - 1]);
      }
    }

    function updateStatus(text) {
      statusEl.textContent = text;
    }

    function toggleActionsCollapsed() {
      meta.actionsCollapsed = !meta.actionsCollapsed;
      localStorage.setItem(META_KEY, JSON.stringify(meta));
      applyActionsCollapsed();
    }

    function applyActionsCollapsed() {
      const collapsed = Boolean(meta.actionsCollapsed);
      bottomActions.classList.toggle("collapsed", collapsed);
      document.body.classList.toggle("actions-collapsed", collapsed);
      actionToggleBtn.textContent = collapsed ? "操作" : "收起";
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? sanitizeState(JSON.parse(raw)) : defaultState();
      } catch {
        return defaultState();
      }
    }

    function loadMeta() {
      try {
        const raw = localStorage.getItem(META_KEY);
        return raw
          ? { dirty: false, lastEdit: null, lastClearedStep: null, lastClearedAll: null, activeView: "patient", activeVitalIndex: 0, activeRecordIndex: 0, actionsCollapsed: true, uiVersion: 0, ...JSON.parse(raw) }
          : { dirty: false, lastEdit: null, lastClearedStep: null, lastClearedAll: null, activeView: "patient", activeVitalIndex: 0, activeRecordIndex: 0, actionsCollapsed: true, uiVersion: UI_VERSION };
      } catch {
        return { dirty: false, lastEdit: null, lastClearedStep: null, lastClearedAll: null, activeView: "patient", activeVitalIndex: 0, activeRecordIndex: 0, actionsCollapsed: true, uiVersion: UI_VERSION };
      }
    }

    function sanitizeState(raw) {
      const base = defaultState();
      const merged = deepMerge(base, raw || {});
      merged.patient.arrivalMode = normalizeArrivalMode(merged.patient.arrivalMode);
      merged.consults = Array.isArray(raw?.consults) && raw.consults.length ? raw.consults.map(defaultConsult) : base.consults;
      merged.exams = Array.isArray(raw?.exams) && raw.exams.length ? raw.exams.map(defaultExam) : base.exams;
      merged.vitals = Array.isArray(raw?.vitals) && raw.vitals.length ? raw.vitals.map(defaultVital) : base.vitals;
      merged.records = Array.isArray(raw?.records) && raw.records.length ? raw.records.map(defaultRecord) : base.records;
      merged.primaryNurse = String(raw?.primaryNurse || merged.records.find(row => row.nurse)?.nurse || "").trim();
      if (merged.primaryNurse) merged.records.forEach(row => { if (!row.nurse) row.nurse = merged.primaryNurse; });
      merged.templateLibrary = defaultTemplateLibrary(raw?.templateLibrary);
      return merged;
    }

    function normalizeArrivalMode(value) {
      const map = {
        "急诊门诊转入": "急门转入",
        "急诊门诊": "急门转入",
        "朋友/家属陪同": "家属朋友",
        "朋友家属陪同": "家属朋友",
        "朋友/家属": "家属朋友"
      };
      return map[value] || value || "120";
    }

    function deepMerge(base, incoming) {
      if (Array.isArray(base)) return Array.isArray(incoming) ? incoming : base;
      if (base && typeof base === "object") {
        const out = { ...base };
        Object.keys(base).forEach(key => {
          out[key] = deepMerge(base[key], incoming ? incoming[key] : undefined);
        });
        return out;
      }
      return incoming === undefined || incoming === null ? base : incoming;
    }

    function getByPath(path) {
      return path.split(".").reduce((target, key) => target == null ? undefined : target[key], state);
    }

    function setByPath(path, value) {
      const parts = path.split(".");
      let target = state;
      while (parts.length > 1) {
        target = target[parts.shift()];
      }
      target[parts[0]] = value;
      syncBloodPressurePath(path);
    }

    function defaultRowFor(collection) {
      if (collection === "consults") return defaultConsult();
      if (collection === "exams") return defaultExam();
      if (collection === "vitals") return defaultVital();
      if (collection === "records") return defaultRecord();
      return {};
    }

    function appendText(current, next) {
      const text = (current || "").trim();
      return text ? `${text}\n${next}` : next;
    }

    function isEmptyValue(value) {
      if (Array.isArray(value)) return value.length === 0;
      if (value && typeof value === "object") return Object.values(value).every(isEmptyValue);
      return value === "" || value === undefined || value === null;
    }

    function emptyLike(value) {
      if (Array.isArray(value)) return [];
      if (value && typeof value === "object") {
        return Object.fromEntries(Object.keys(value).map(key => [key, ""]));
      }
      return "";
    }

    function buildNumberOptions(start, end, step, suffix) {
      const list = [];
      for (let value = start; value <= end + 0.001; value += step) {
        list.push(`${value.toFixed(1)}${suffix}`);
      }
      return list;
    }

    function buildIntegerOptions(start, end, step) {
      const list = [];
      for (let value = start; value <= end; value += step) {
        list.push(String(value));
      }
      return list;
    }

    function valueOrDefault(source, key, fallback) {
      return Object.prototype.hasOwnProperty.call(source, key) ? source[key] : fallback;
    }

    function nowTime() {
      const date = new Date();
      return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function addMinutesToTime(value, minutes) {
      const match = String(value || "").trim().match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return "";
      const hours = Number(match[1]);
      const mins = Number(match[2]);
      if (hours > 23 || mins > 59) return "";
      const total = (hours * 60 + mins + minutes + 24 * 60) % (24 * 60);
      return `${pad(Math.floor(total / 60))}:${pad(total % 60)}`;
    }

    function toDatetimeLocal(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function chunk(items, size) {
      const groups = [];
      for (let index = 0; index < items.length; index += size) {
        groups.push(items.slice(index, index + size));
      }
      return groups;
    }

    function padRows(items, length, empty) {
      const rows = items.map(clone);
      while (rows.length < length) rows.push(clone(empty));
      return rows.slice(0, length);
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function attr(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function printValue(value) {
      const text = escapeHtml(value).trim();
      return text || "&nbsp;";
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toastEl.classList.remove("show"), 1800);
    }
  </script>
</body>
</html>
